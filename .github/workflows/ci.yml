name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/magicboxlab-ai/netsight-sdk.git"
          pip install "git+https://github.com/magicboxlab-ai/netsight-packs-paloalto.git@paloalto-firewall-xml/v0.1.1#subdirectory=packs/paloalto-firewall-xml"
          pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest tests/ -q
